# config/paths.yaml — Model file paths (all on E:\ drive)
# Read by src/config.py — do not hardcode paths elsewhere.

models:
  stt:
    # faster-whisper distil-large-v3, INT8 quantised, CPU only
    # Source: Systran/faster-distil-whisper-large-v3 (HuggingFace)
    model_dir:    "E:\\distil-large-v3-ct2-int8"
    device:       "cpu"
    compute_type: "int8"

  tts:
    # Kokoro-82M ONNX — raw onnxruntime inference (no kokoro-onnx pip package)
    # Source: onnx-community/Kokoro-82M-v1.0-ONNX (HuggingFace)
    #
    # Downloaded folder layout:
    #   E:\Kokoro-82M-v1.0-ONNX\
    #     onnx\
    #       model_quantized.onnx ← RECOMMENDED: pure INT8, 89 MB, CPU-safe
    #       model_quantized.onnx← pure INT8, 92 MB
    #       model_fp16.onnx     ← fp16, 163 MB
    #       model.onnx          ← fp32, 326 MB
    #       model_q4.onnx       ← 4-bit, smallest but lower quality
    #     voices\
    #       am_fenrir.bin       ← narrator (Morgan Freeman style)
    #       am_michael.bin      ← teacher (warm, clear)
    #       am_onyx.bin         ← quick/device control (crisp)
    #       ... (54+ voice .bin files total in v1.0)
    #
    # v1.0 breaking change: ONNX input key is "input_ids" (was "tokens")

    onnx_model:  "E:\\Kokoro-82M-v1.0-ONNX\\onnx\\model_quantized.onnx"
    voices_dir:  "E:\\Kokoro-82M-v1.0-ONNX\\voices"

    # Voices used by Sage Kaizen personas:
    #   am_onyx     → narrator, mentor, chat     (deep, resonant, gravelly — African-American male aesthetic)
    #   am_michael  → teacher                    (warm, clear American male)
    #   am_echo     → quick/device control       (resonant, clear American male)

logs:
  # default: unified log file read by sk_logging.get_logger()
  # Path is relative to the project root (sage_kaizen_ai_voice/).
  # Python fallback when this key is absent: logs/sage_kaizen_voice.log
  default: "logs/sage_kaizen.log"
  dir:  "logs"

output:
  dir: "output"
